{% extends "base.html" %}
{% block content %}
<div class="auth-form">
    <h2 class="text-center">Вход в систему Black Mesa</h2>
    <form method="POST">
        <div class="form-group"><label>Имя пользователя</label><input type="text" name="username" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" name="password" required></div>
        <button type="submit" class="btn-primary">Войти</button>
    </form>
    <p class="text-center mt-3">Нет аккаунта? <a href="{{ url_for('register') }}">Регистрация</a></p>
</div>
{% endblock %}
